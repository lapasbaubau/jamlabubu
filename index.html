<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Jadwal Meeting</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#ffffff;
font-family: Arial, sans-serif;
}

/* container utama */
.container{
width:100%;
height:100vh;
}

/* tampilan laptop / desktop */
@media (min-width:769px){

.container{
zoom:85%;
height:118vh; /* kompensasi zoom */
}

}

/* tampilan HP */
@media (max-width:768px){

html,body{
overflow:auto;
}

.container{
zoom:100%;
height:100vh;
}

}

iframe{
width:100%;
height:100%;
border:none;
display:block;
}

</style>
</head>

<body>

<div class="container">

<iframe
src="https://script.google.com/macros/s/AKfycbz2X-MBKhV3oaKrDT6zlTBIAvspowbLer5bwZBsSrNmoF_Dt5gaJfyAoUFBoydGkzE/exec"
allowfullscreen>
</iframe>

</div>

</body>
</html>
