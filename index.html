<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jadwal Meeting</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Arial, sans-serif;
}

/* SPLASH SCREEN */
#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#ffffff;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
transition:opacity 1s ease;
}

#splash img{
max-width:80%;
max-height:80%;
}

/* container utama */
.container{
width:100%;
height:100vh;
}

/* laptop */
@media (min-width:769px){
.container{
zoom:85%;
height:118vh;
}
}

/* HP */
@media (max-width:768px){
html,body{
overflow:auto;
}

.container{
zoom:100%;
height:100vh;
}
}

iframe{
width:100%;
height:100%;
border:none;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
<img src="https://raw.githubusercontent.com/lapasbaubau/jamlabubu/refs/heads/main/bukutamu.png">
</div>

<div class="container">
<iframe
src="https://script.google.com/macros/s/AKfycbz2X-MBKhV3oaKrDT6zlTBIAvspowbLer5bwZBsSrNmoF_Dt5gaJfyAoUFBoydGkzE/exec"
allowfullscreen>
</iframe>
</div>

<script>

setTimeout(function(){

document.getElementById("splash").style.opacity="0";

setTimeout(function(){
document.getElementById("splash").style.display="none";
},1000);

},2500); // durasi splash 2.5 detik

</script>

</body>
</html>
