<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jadwal Meeting</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#fff;
}

/* SPLASH SCREEN */

#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:linear-gradient(45deg,#003366,#0055aa,#0077cc,#003366);
background-size:400% 400%;
animation:bgMove 8s ease infinite;
z-index:9999;
}

/* animasi background */
@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* logo */

.logo{
width:260px;
animation:logoZoom 1.5s ease forwards,
           logoFloat 3s ease-in-out infinite;
filter:drop-shadow(0 0 25px rgba(255,255,255,0.8));
}

/* zoom masuk */

@keyframes logoZoom{
0%{
transform:scale(0.3);
opacity:0;
}
100%{
transform:scale(1);
opacity:1;
}
}

/* efek melayang */

@keyframes logoFloat{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-15px);
}
}

/* spinner modern */

.loader{
margin-top:40px;
width:60px;
height:60px;
border-radius:50%;
border:6px solid rgba(255,255,255,0.3);
border-top:6px solid #ffffff;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* container aplikasi */

.container{
width:100%;
height:100vh;
}

/* zoom laptop */

@media (min-width:769px){
.container{
zoom:85%;
height:118vh;
}
}

/* HP */

@media (max-width:768px){

html,body{
overflow:auto;
}

.container{
zoom:100%;
height:100vh;
}

}

iframe{
width:100%;
height:100%;
border:none;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">

<img class="logo"
src="https://raw.githubusercontent.com/lapasbaubau/jamlabubu/refs/heads/main/bukutamu.png">

<div class="loader"></div>

</div>


<!-- APLIKASI -->
<div class="container">

<iframe
src="https://script.google.com/macros/s/AKfycbz2X-MBKhV3oaKrDT6zlTBIAvspowbLer5bwZBsSrNmoF_Dt5gaJfyAoUFBoydGkzE/exec"
allowfullscreen>
</iframe>

</div>


<script>

/* hilangkan splash setelah 3 detik */

setTimeout(function(){

document.getElementById("splash").style.opacity="0";
document.getElementById("splash").style.transition="opacity 1s";

setTimeout(function(){
document.getElementById("splash").style.display="none";
},1000);

},3000);

</script>

</body>
</html>
