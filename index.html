<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jadwal Meeting</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#fff;
}

/* SPLASH */

#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:linear-gradient(45deg,#003366,#0055aa,#0077cc,#003366);
background-size:400% 400%;
animation:bgMove 8s ease infinite;
z-index:9999;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* LOGO */

.logo{
max-width:180px;        /* diperkecil agar tajam */
width:40vw;
height:auto;
image-rendering:auto;
animation:logoZoom 1.2s ease forwards,
          logoFloat 3s ease-in-out infinite;
filter:drop-shadow(0 0 15px rgba(255,255,255,0.7));
}

/* zoom lebih kecil agar tidak blur */

@keyframes logoZoom{
0%{
transform:scale(0.7);
opacity:0;
}
100%{
transform:scale(1);
opacity:1;
}
}

@keyframes logoFloat{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

/* spinner */

.loader{
margin-top:30px;
width:50px;
height:50px;
border-radius:50%;
border:5px solid rgba(255,255,255,0.3);
border-top:5px solid #ffffff;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* container aplikasi */

.container{
width:100%;
height:100vh;
}

@media (min-width:769px){
.container{
zoom:85%;
height:118vh;
}
}

@media (max-width:768px){

html,body{
overflow:auto;
}

.container{
zoom:100%;
height:100vh;
}

}

iframe{
width:100%;
height:100%;
border:none;
}

</style>
</head>

<body>

<div id="splash">

<img class="logo"
src="https://raw.githubusercontent.com/lapasbaubau/jamlabubu/refs/heads/main/bukutamu.png">

<div class="loader"></div>

</div>


<div class="container">

<iframe
src="https://script.google.com/macros/s/AKfycbz2X-MBKhV3oaKrDT6zlTBIAvspowbLer5bwZBsSrNmoF_Dt5gaJfyAoUFBoydGkzE/exec"
allowfullscreen>
</iframe>

</div>


<script>

setTimeout(function(){

document.getElementById("splash").style.opacity="0";
document.getElementById("splash").style.transition="opacity 1s";

setTimeout(function(){
document.getElementById("splash").style.display="none";
},1000);

},3000);

</script>

</body>
</html>
